name: Deploy to shop.rjck.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy SQL to live server
        env:
          SSH_KEY_RAW: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DB_ROOT_PASS: ${{ secrets.DB_ROOT_PASS }}
        run: |
          echo '-----BEGIN OPENSSH PRIVATE KEY-----' > /tmp/deploy_key
          echo "$SSH_KEY_RAW" | fold -w 70 >> /tmp/deploy_key
          echo '-----END OPENSSH PRIVATE KEY-----' >> /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no -r sql/ "$SERVER_USER@$SERVER_HOST:/www/sites/shop.rjck.com/"
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" "MYSQL=\$(sudo docker ps --format '{{.Names}}' | grep -i mysql | head -1); for f in /www/sites/shop.rjck.com/sql/*.sql; do sudo docker exec -i \"\$MYSQL\" mysql -uroot -p'${DB_ROOT_PASS}' shop < \"\$f\"; done && echo Done"
          rm /tmp/deploy_key
