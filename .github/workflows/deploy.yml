name: Deploy to shop.rjck.com

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /www/sites/shop.rjck.com
            # Create backup
            mkdir -p .backup
            cp web/templates/partials/admin_footer.html .backup/admin_footer.html.bak || true
            cp web/templates/partials/seller_footer.html .backup/seller_footer.html.bak || true

            # Deploy new files
            tar -xzf /tmp/shop_update.tar.gz -C /

            echo "✅ Deployment complete"
            echo "Domain: shop.rjck.com"
