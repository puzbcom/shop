name: Deploy to shop.rjck.com

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Go binary
        run: |
          if [ -f "go.mod" ]; then
            go mod tidy
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o server ./cmd/server
            chmod +x server
          fi

      - name: Upload files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "web/templates,sql,server"
          target: /www/sites/shop
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /www/sites/shop

            # Run SQL migrations
            if [ -d sql ]; then
              for f in sql/*.sql; do
                mysql -uroot -p${{ secrets.DB_ROOT_PASS }} shop < "$f" && echo "Applied: $f"
              done
            fi

            # Restart server
            pkill -f "./server" || true
            nohup ./server > server.log 2>&1 &
            sleep 2
            echo "Done: shop.rjck.com"
