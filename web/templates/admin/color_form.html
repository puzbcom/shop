{{define "content"}}
<div class="aiz-titlebar mt-2 mb-4">
  <div class="row align-items-center">
    <div class="col-md-6"><h1 class="h3">{{if .Color}}{{translate "Edit Color"}}{{else}}{{translate "Add Color"}}{{end}}</h1></div>
  </div>
</div>

<div class="card rounded-0 shadow-none">
  <div class="card-body">
    <form method="POST" action="{{if .Color}}/admin/colors/{{.Color.ID}}{{else}}/admin/colors{{end}}">
      <input type="hidden" name="_token" value="{{csrf_token}}">
      <div class="form-group row">
        <label class="col-md-3 col-form-label">{{translate "Color Name"}}</label>
        <div class="col-md-9">
          <input type="text" name="name" class="form-control" required {{if .Color}}value="{{deref_str .Color.Name}}"{{end}}>
          <small class="text-muted">{{translate "Enter color name"}}</small>
        </div>
      </div>
      <div class="form-group row">
        <label class="col-md-3 col-form-label">{{translate "Color Code"}}</label>
        <div class="col-md-9">
          <input type="text" name="code" class="form-control" {{if .Color}}value="{{deref_str .Color.Code}}"{{end}}>
          <small class="text-muted">{{translate "Enter color code (e.g. #FF0000)"}}</small>
        </div>
      </div>
      <div class="form-group row">
        <div class="col-md-9 ml-auto">
          <button type="submit" class="btn btn-primary">{{translate "Save"}}</button>
          <a href="/admin/colors" class="btn btn-secondary">{{translate "Cancel"}}</a>
        </div>
      </div>
    </form>
  </div>
</div>
{{end}}
