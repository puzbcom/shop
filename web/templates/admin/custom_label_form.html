{{define "content"}}
<div class="aiz-titlebar mt-2 mb-4">
  <div class="row align-items-center">
    <div class="col-md-6"><h1 class="h3">{{if .Label}}{{translate "Edit Custom Label"}}{{else}}{{translate "Add Custom Label"}}{{end}}</h1></div>
  </div>
</div>

<div class="card rounded-0 shadow-none">
  <div class="card-body">
    <form method="POST" action="{{if .Label}}/admin/custom-labels/{{.Label.ID}}{{else}}/admin/custom-labels{{end}}">
      <input type="hidden" name="_token" value="{{csrf_token}}">
      <div class="form-group row">
        <label class="col-md-3 col-form-label">{{translate "Label Text"}}</label>
        <div class="col-md-9">
          <input type="text" name="text" class="form-control" required {{if .Label}}value="{{.Label.Text}}"{{end}}>
          <small class="text-muted">{{translate "Enter label text"}}</small>
        </div>
      </div>
      <div class="form-group row">
        <label class="col-md-3 col-form-label">{{translate "Background Color"}}</label>
        <div class="col-md-9">
          <input type="color" name="background_color" class="form-control" {{if .Label}}value="{{.Label.BackgroundColor}}"{{else}}value="#FF0000"{{end}}>
        </div>
      </div>
      <div class="form-group row">
        <label class="col-md-3 col-form-label">{{translate "Text Color"}}</label>
        <div class="col-md-9">
          <input type="color" name="text_color" class="form-control" {{if .Label}}value="{{.Label.TextColor}}"{{else}}value="#FFFFFF"{{end}}>
        </div>
      </div>
      <div class="form-group row">
        <div class="col-md-9 ml-auto">
          <button type="submit" class="btn btn-primary">{{translate "Save"}}</button>
          <a href="/admin/custom-labels" class="btn btn-secondary">{{translate "Cancel"}}</a>
        </div>
      </div>
    </form>
  </div>
</div>
{{end}}
