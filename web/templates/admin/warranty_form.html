{{define "content"}}
<div class="aiz-titlebar mt-2 mb-4">
  <div class="row align-items-center">
    <div class="col-md-6"><h1 class="h3">{{if .Warranty}}{{translate "Edit Warranty"}}{{else}}{{translate "Add Warranty"}}{{end}}</h1></div>
  </div>
</div>

<div class="card rounded-0 shadow-none">
  <div class="card-body">
    <form method="POST" action="{{if .Warranty}}/admin/warranties/{{.Warranty.ID}}{{else}}/admin/warranties{{end}}">
      <input type="hidden" name="_token" value="{{csrf_token}}">
      <div class="form-group row">
        <label class="col-md-3 col-form-label">{{translate "Warranty Text"}}</label>
        <div class="col-md-9">
          <textarea name="text" class="form-control" required rows="4">{{if .Warranty}}{{.Warranty.Text}}{{end}}</textarea>
          <small class="text-muted">{{translate "Enter warranty details"}}</small>
        </div>
      </div>
      <div class="form-group row">
        <div class="col-md-9 ml-auto">
          <button type="submit" class="btn btn-primary">{{translate "Save"}}</button>
          <a href="/admin/warranties" class="btn btn-secondary">{{translate "Cancel"}}</a>
        </div>
      </div>
    </form>
  </div>
</div>
{{end}}
