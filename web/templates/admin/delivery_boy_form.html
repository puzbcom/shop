{{define "content"}}
<div class="aiz-titlebar mt-2 mb-4">
  <div class="row align-items-center">
    <div class="col-md-6"><h1 class="h3">{{if .Boy}}{{translate "Edit Delivery Boy"}}{{else}}{{translate "Add Delivery Boy"}}{{end}}</h1></div>
  </div>
</div>

<div class="card rounded-0 shadow-none">
  <div class="card-body">
    <form method="POST" action="{{if .Boy}}/admin/delivery-boys/{{.Boy.ID}}{{else}}/admin/delivery-boys{{end}}">
      <input type="hidden" name="_token" value="{{csrf_token}}">
      <div class="form-group row">
        <label class="col-md-3 col-form-label">{{translate "Name"}}</label>
        <div class="col-md-9">
          <input type="text" name="name" class="form-control" required {{if .Boy}}value="{{.Boy.Name}}"{{end}}>
        </div>
      </div>
      <div class="form-group row">
        <label class="col-md-3 col-form-label">{{translate "Email"}}</label>
        <div class="col-md-9">
          <input type="email" name="email" class="form-control" {{if .Boy}}value="{{deref_str .Boy.Email}}"{{end}}>
        </div>
      </div>
      <div class="form-group row">
        <label class="col-md-3 col-form-label">{{translate "Phone"}}</label>
        <div class="col-md-9">
          <input type="text" name="phone" class="form-control" {{if .Boy}}value="{{deref_str .Boy.Phone}}"{{end}}>
        </div>
      </div>
      <div class="form-group row">
        <div class="col-md-9 ml-auto">
          <button type="submit" class="btn btn-primary">{{translate "Save"}}</button>
          <a href="/admin/delivery-boys" class="btn btn-secondary">{{translate "Cancel"}}</a>
        </div>
      </div>
    </form>
  </div>
</div>
{{end}}
