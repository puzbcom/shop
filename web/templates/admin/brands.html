{{define "content"}}
<div class="aiz-titlebar mt-2 mb-4">
  <div class="row align-items-center">
    <div class="col-md-6"><h1 class="h3">{{translate "Brands"}}</h1></div>
  </div>
</div>

<div class="row">
  <div class="col-lg-4 mb-4">
    <div class="card rounded-0 shadow-none">
      <div class="card-header"><h5 class="mb-0 h6">{{translate "Add Brand"}}</h5></div>
      <div class="card-body">
        <form method="POST" action="/admin/brands">
          <input type="hidden" name="_token" value="{{csrf_token}}">
          <div class="form-group">
            <label>{{translate "Name"}} <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary">{{translate "Save Brand"}}</button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-lg-8">
    <div class="card rounded-0 shadow-none">
      <div class="card-header"><h5 class="mb-0 h6">{{translate "All Brands"}}</h5></div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table aiz-table mb-0">
            <thead>
              <tr>
                <th>#</th>
                <th>{{translate "Logo"}}</th>
                <th>{{translate "Name"}}</th>
                <th class="text-right">{{translate "Options"}}</th>
              </tr>
            </thead>
            <tbody>
              {{range .Brands}}
              <tr>
                <td>{{.ID}}</td>
                <td>{{if .Logo}}<img src="{{uploaded_asset .Logo}}" style="height:32px" alt="">{{else}}<span class="text-muted">—</span>{{end}}</td>
                <td>{{.Name}}</td>
                <td class="text-right">
                  <a href="/admin/brands/{{.ID}}/edit" class="btn btn-soft-info btn-icon btn-circle btn-sm" title="{{translate "Edit"}}"><i class="las la-edit"></i></a>
                  <form method="POST" action="/admin/brands/{{.ID}}/delete" class="d-inline" onsubmit="return confirm('Delete this brand?')">
                    <input type="hidden" name="_token" value="{{csrf_token}}">
                    <button type="submit" class="btn btn-soft-danger btn-icon btn-circle btn-sm" title="{{translate "Delete"}}"><i class="las la-trash"></i></button>
                  </form>
                </td>
              </tr>
              {{else}}
              <tr><td colspan="4" class="text-center py-4">{{translate "No brands yet"}}</td></tr>
              {{end}}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{{end}}
