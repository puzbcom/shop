{{define "content"}}
<div class="aiz-titlebar mt-2 mb-4">
  <div class="row align-items-center">
    <div class="col-md-6"><h1 class="h3">{{translate "Add Coupon"}}</h1></div>
  </div>
</div>

<div class="card rounded-0 shadow-none">
  <div class="card-body">
    <form method="POST" action="/seller/coupons">
      <input type="hidden" name="_token" value="{{csrf_token}}">

      <div class="form-group row">
        <label class="col-md-3 col-form-label">{{translate "Coupon Code"}} <span class="text-danger">*</span></label>
        <div class="col-md-9">
          <input type="text" name="code" class="form-control" placeholder="e.g. SUMMER20" required>
        </div>
      </div>

      <div class="form-group row">
        <label class="col-md-3 col-form-label">{{translate "Discount Type"}} <span class="text-danger">*</span></label>
        <div class="col-md-9">
          <select name="discount_type" class="form-control" required>
            <option value="percent">{{translate "Percentage"}}</option>
            <option value="amount">{{translate "Flat Amount"}}</option>
          </select>
        </div>
      </div>

      <div class="form-group row">
        <label class="col-md-3 col-form-label">{{translate "Discount"}} <span class="text-danger">*</span></label>
        <div class="col-md-9">
          <input type="number" name="discount" class="form-control" step="0.01" min="0" required>
        </div>
      </div>

      <div class="form-group row">
        <label class="col-md-3 col-form-label">{{translate "Details"}}</label>
        <div class="col-md-9">
          <textarea name="details" class="form-control" rows="3" placeholder="{{translate "Coupon description"}}"></textarea>
        </div>
      </div>

      <div class="form-group row">
        <div class="col-md-9 ml-auto">
          <button type="submit" class="btn btn-primary">{{translate "Save Coupon"}}</button>
          <a href="/seller/coupons" class="btn btn-light ml-2">{{translate "Cancel"}}</a>
        </div>
      </div>
    </form>
  </div>
</div>
{{end}}
