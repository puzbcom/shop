{{define "content"}}
<div class="aiz-titlebar mt-2 mb-4">
  <div class="row align-items-center">
    <div class="col-md-6"><h1 class="h3">{{translate "Conversations"}}</h1></div>
  </div>
</div>

<div class="card rounded-0 shadow-none">
  <div class="card-body p-0">
    {{range .Items}}
    <a href="/seller/conversations/{{.Conv.ID}}" class="d-flex align-items-center p-3 border-bottom text-reset text-decoration-none" style="{{if .Unread}}background:#f8f9ff{{end}}">
      <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center mr-3 flex-shrink-0" style="width:44px;height:44px;font-weight:700;font-size:16px">
        {{first_char .Other.Name}}
      </div>
      <div class="flex-grow-1" style="min-width:0">
        <div class="fw-700 d-flex align-items-center gap-2">
          {{.Other.Name}}
          {{if .Unread}}<span class="badge badge-primary ml-2">{{translate "New"}}</span>{{end}}
        </div>
        <div class="text-muted text-truncate" style="font-size:12px">{{deref_str .Conv.Title}}</div>
      </div>
      <div class="text-muted ml-3 flex-shrink-0" style="font-size:11px">{{date_format .Conv.UpdatedAt "Jan 2"}}</div>
    </a>
    {{else}}
    <div class="text-center py-5 text-muted">
      <i class="las la-comments la-3x mb-3 d-block"></i>
      <div>{{translate "No conversations yet"}}</div>
    </div>
    {{end}}
  </div>
</div>
{{end}}
